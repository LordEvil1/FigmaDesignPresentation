<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>محصولات</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

.page {
  position: relative;
  width: 100%;
  height: 100vh;
  background-image: url('images/ui/postr2222.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  position: relative;
  width: 100%;
  flex-shrink: 0;
  z-index: 50;
}

.header .hdr-img {
  width: 100%;
  height: 150px;
  display: block;
  object-fit: cover;
  object-position: center;
}

.header .logo {
  position: absolute;
  top: 10px;
  left: 20px;
  height: 120px;
  object-fit: contain;
}

.header-icons {
  position: absolute;
  top: 25%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  align-items: center;
  gap: 18px;
  direction: ltr;
}

.header-icons a,
.header-icons img {
  display: block;
  height: 38px;
  width: auto;
  object-fit: contain;
  cursor: pointer;
}

/* PRODUCTS DROPDOWN */
.products-dropdown {
  position: relative;
  display: inline-block;
}

.products-dropdown > img {
  display: block;
  height: 38px;
  width: auto;
  object-fit: contain;
  cursor: pointer;
}

.dropdown-menu {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.97);
  border-radius: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.18);
  min-width: 130px;
  z-index: 200;
  overflow: hidden;
}

.products-dropdown:hover .dropdown-menu,
.dropdown-menu.open {
  display: block;
}

.dropdown-menu a {
  display: block !important;
  padding: 10px 18px !important;
  color: #033394 !important;
  text-decoration: none !important;
  font-family: 'B Mahsa', 'Tahoma', Arial, sans-serif;
  font-size: 14px !important;
  height: auto !important;
  width: auto !important;
  text-align: center;
  border-bottom: 1px solid #eee;
}

.dropdown-menu a:last-child { border-bottom: none; }
.dropdown-menu a:hover { background: #f0f5ff !important; color: #0055cc !important; }

/* BOTTOM STRIP */
.bottom-strip {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 10px 0;
  gap: 80px;
  width: 100%;
  background: rgb(213, 229, 233);
  flex-shrink: 0;
  margin-top: auto;
}

.bottom-strip a {
  display: block;
  flex: none;
}

.bottom-strip img {
  height: 100px;
  width: auto;
  object-fit: contain;
  border-radius: 6px;
  cursor: pointer;
  display: block;
}

/* FOOTER */
.footer {
  width: 100%;
  flex-shrink: 0;
  z-index: 1;
}

.footer img {
  width: 100%;
  height: 45px;
  display: block;
  object-fit: fill;
}

@media (max-width: 768px) {
  .header .hdr-img { height: 85px; }
  .header .logo { height: 65px; top: 5px; left: 10px; }
  .header-icons { gap: 10px; }
  .header-icons a, .header-icons img, .products-dropdown > img { height: 26px; }
  .bottom-strip { gap: 20px; padding: 8px 5px; }
  .bottom-strip img { height: 60px; }
  .footer img { height: 30px; }
}
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <img src="images/ui/PagesHeader.png" alt="header" class="hdr-img" />
    <img src="images/ui/logo222.png" alt="logo" class="logo" />
    <div class="header-icons">
      <img src="images/icons/SearchIcon.png" alt="search" />
      <a href="index.html"><img src="images/icons/HomeIcon.png" alt="home" /></a>
      <div class="products-dropdown">
        <img src="images/icons/SeeProductsIcon.png" alt="products" id="productsBtn" />
        <div class="dropdown-menu" id="dropdownMenu">
          <a href="index (3).html">سایه بان</a>
          <a href="index (4).html">صندلی</a>
          <a href="index (6).html">باربیکیو</a>
          <a href="index (5).html">لوازم شنا</a>
        </div>
      </div>
      <img src="images/icons/PurchaseBagIcon.png" alt="cart" />
      <a href="index (2).html"><img src="images/icons/AboutUsIcon.png" alt="about" /></a>
    </div>
  </div>

  <div class="bottom-strip">
    <a href="index (3).html"><img src="images/categories/Shelter.png" alt="سایه بان" /></a>
    <a href="index (4).html"><img src="images/categories/Chair.png" alt="صندلی" /></a>
    <a href="index (6).html"><img src="images/categories/barbique.png" alt="باربیکیو" /></a>
    <a href="index (5).html"><img src="images/categories/SwimGlass.png" alt="لوازم شنا" /></a>
  </div>

  <div class="footer">
    <img src="images/ui/putr.png" alt="footer" />
  </div>

</div>
<script>
  var btn = document.getElementById('productsBtn');
  var menu = document.getElementById('dropdownMenu');
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    menu.classList.toggle('open');
  });
  document.addEventListener('click', function() {
    menu.classList.remove('open');
  });
</script>
</body>
</html>
