<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>محصولات</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

.page {
  position: relative;
  width: 100%;
  height: 100vh;
  background-image: url('pasabi.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  position: relative;
  width: 100%;
  flex-shrink: 0;
}

.header .hdr-img {
  width: 100%;
  height: 150px;
  display: block;
  object-fit: cover;
  object-position: center;
}

.header .logo {
  position: absolute;
  top: 10px;
  left: 20px;
  height: 120px;
  object-fit: contain;
}

.header .brand {
  position: absolute;
  top: 20px;
  right: 20px;
  height: 30px;
  object-fit: contain;
}

.header-icons {
  position: absolute;
  top: 25%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  align-items: center;
  gap: 18px;
  direction: ltr;
}

.header-icons a,
.header-icons img {
  display: block;
  height: 38px;
  width: auto;
  object-fit: contain;
  cursor: pointer;
}

/* POSTER */
.poster-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

.poster-img {
  max-width: 70%;
  max-height: 100%;
  object-fit: contain;
  display: block;
}

.back-btn {
  position: absolute;
  left: 30px;
  top: 50%;
  transform: translateY(-50%);
  height: 50px;
  width: auto;
  object-fit: contain;
  cursor: pointer;
  z-index: 2;
}

/* BOTTOM STRIP */
.bottom-strip {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 10px 0;
  gap: 80px;
  width: 100%;
  background: rgb(213, 229, 233);
  flex-shrink: 0;
}

.bottom-strip a {
  display: block;
  flex: none;
}

.bottom-strip img {
  height: 100px;
  width: auto;
  object-fit: contain;
  border-radius: 6px;
  cursor: pointer;
  display: block;
}

/* FOOTER */
.footer {
  width: 100%;
  flex-shrink: 0;
}

.footer img {
  width: 100%;
  height: 35px;
  display: block;
  object-fit: cover;
}
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <img src="PagesHeader.png" alt="header" class="hdr-img" />
    <img src="logo222.png" alt="logo" class="logo" />
    <img src="LogoTypeInPersian.png" alt="brand" class="brand" />
    <div class="header-icons">
      <img src="SearchIcon.png" alt="search" />
      <a href="index.html"><img src="HomeIcon.png" alt="home" /></a>
      <a href="index.html"><img src="SeeProductsIcon.png" alt="products" /></a>
      <img src="PurchaseBagIcon.png" alt="cart" />
      <a href="index%20(2).html"><img src="AboutUsIcon.png" alt="about" /></a>
    </div>
  </div>

  <div class="poster-area">
    <img src="postr2222.png" alt="poster" class="poster-img" />
  </div>

  <div class="bottom-strip">
    <a href="index (3).html"><img src="Shelter.png" alt="چادر" /></a>
    <a href="index (4).html"><img src="Chair.png" alt="صندلی" /></a>
    <a href="index (6).html"><img src="barbique.png" alt="باربیکیو" /></a>
    <a href="index (5).html"><img src="SwimGlass.png" alt="عینک" /></a>
  </div>

  <div class="footer">
    <img src="putr.png" alt="footer" />
  </div>

</div>
</body>
</html>
