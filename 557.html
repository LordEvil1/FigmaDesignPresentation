<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ماسک و اسنورکل شنا</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

.page {
  position: relative;
  width: 100%;
  height: 100vh;
  background-image: url('images/swim/557Page.png');
  background-size: 100% 100%;
  background-repeat: no-repeat;
}

.btn-back {
  position: absolute;
  left: 1.5%;
  top: 44%;
  width: 6%;
  height: 12%;
  cursor: pointer;
}

.btn-home {
  position: absolute;
  left: calc(40.5% - 10px);
  top: 0.5%;
  width: 5%;
  height: 6%;
  cursor: pointer;
}

.toggle-btn {
  position: absolute;
  bottom: 2%;
  right: 16%;
  width: 23%;
  height: 22%;
  cursor: pointer;
  z-index: 10;
  background: transparent;
  border: none;
}

@media (max-width: 768px) {
  .page {
    background-image: url('images/swim/557Page-Mobile.png');
  }
  .btn-back {
    left: 1.5%;
    top: 3%;
    width: 15%;
    height: 12%;
  }
  .btn-home {
    left: calc(58.5% - 10px);
  }
  .toggle-btn {
    bottom: 72%;
    right: 10%;
    left: auto;
    width: 35%;
    height: 10%;
  }
}
</style>
</head>
<body>
<div class="page" id="page">
  <a href="index (5).html" class="btn-back"></a>
  <a href="index.html" class="btn-home"></a>
  <button class="toggle-btn" id="toggleBtn" onclick="toggleImage()"></button>
</div>

<script>
  var desktopImages = ['images/swim/557Page.png', 'images/swim/Frame 27-2.png'];
  var mobileImages  = ['images/swim/557Page-Mobile.png', 'images/swim/Frame 27-2-Mobile.png'];
  var idx = 0;

  function isMobile() { return window.matchMedia('(max-width: 768px)').matches; }

  function toggleImage() {
    var images = isMobile() ? mobileImages : desktopImages;
    idx = (idx + 1) % images.length;
    document.getElementById('page').style.backgroundImage = "url('" + images[idx] + "')";
  }
</script>
</body>
</html>
