<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>محصول</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

.page {
  position: relative;
  width: 100%;
  height: 100vh;
  background-image: url('images/tent/702Page.png');
  background-size: 100% 100%;
  background-repeat: no-repeat;
  background-position: center;
}

.btn-back {
  position: absolute;
  left: 1.5%;
  top: 44%;
  width: 6%;
  height: 12%;
  cursor: pointer;
}

.btn-home {
  position: absolute;
  left: calc(40.5% - 10px);
  top: 0.5%;
  width: 5%;
  height: 6%;
  cursor: pointer;
}

.toggle-btn {
  position: absolute;
  bottom: 2%;
  right: 16%;
  width: 23%;
  height: 22%;
  cursor: pointer;
  z-index: 10;
  background: transparent;
  border: none;
}
</style>
</head>
<body>
<div class="page" id="page">
  <a href="index (3).html" class="btn-back"></a>
  <a href="index.html" class="btn-home"></a>
  <button class="toggle-btn" onclick="toggleImage()"></button>
</div>

<script>
  var images = ['images/tent/702Page.png', 'images/tent/702Page2.png', 'images/tent/702Page3.png'];
  var idx = 0;
  function toggleImage() {
    idx = (idx + 1) % images.length;
    document.getElementById('page').style.backgroundImage = "url('" + images[idx] + "')";
  }
</script>
</body>
</html>
