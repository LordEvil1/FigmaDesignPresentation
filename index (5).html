<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>لوازم شنا</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

.page {
  position: relative;
  width: 100%;
  height: 100vh;
  background-image: url('images/ui/pasabi.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  position: relative;
  width: 100%;
  flex-shrink: 0;
  z-index: 50;
}

.header .hdr-img {
  width: 100%;
  height: 150px;
  display: block;
  object-fit: cover;
  object-position: center;
}

.header .logo {
  position: absolute;
  top: 10px;
  left: 20px;
  height: 120px;
  object-fit: contain;
}

.header-icons {
  position: absolute;
  top: 25%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  align-items: center;
  gap: 18px;
  direction: ltr;
}

.header-icons a,
.header-icons img {
  display: block;
  height: 38px;
  width: auto;
  object-fit: contain;
  cursor: pointer;
}

/* MAIN */
.main-area {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.back-btn {
  position: absolute;
  left: 30px;
  top: 50%;
  transform: translateY(-50%);
  height: 60px;
  object-fit: contain;
  cursor: pointer;
  z-index: 2;
}

.product-grid {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 30px;
  max-width: 90vw;
}

.product-grid a {
  display: block;
  cursor: pointer;
}

.product-grid img {
  height: 300px;
  width: auto;
  max-width: 28vw;
  object-fit: contain;
  display: block;
}

/* PRODUCTS DROPDOWN */
.products-dropdown {
  position: relative;
  display: inline-block;
}

.products-dropdown > img {
  display: block;
  height: 38px;
  width: auto;
  object-fit: contain;
  cursor: pointer;
}

.dropdown-menu {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.97);
  border-radius: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.18);
  min-width: 130px;
  z-index: 200;
  overflow: hidden;
}

.products-dropdown:hover .dropdown-menu,
.dropdown-menu.open {
  display: block;
}

.dropdown-menu a {
  display: block !important;
  padding: 10px 18px !important;
  color: #033394 !important;
  text-decoration: none !important;
  font-family: 'B Mahsa', 'Tahoma', Arial, sans-serif;
  font-size: 14px !important;
  height: auto !important;
  width: auto !important;
  text-align: center;
  border-bottom: 1px solid #eee;
}

.dropdown-menu a:last-child { border-bottom: none; }
.dropdown-menu a:hover { background: #f0f5ff !important; color: #0055cc !important; }

@media (max-width: 768px) {
  .header .hdr-img { height: 85px; }
  .header .logo { height: 65px; top: 5px; left: 10px; }
  .header-icons { gap: 10px; }
  .header-icons a, .header-icons img, .products-dropdown > img { height: 26px; }
  .product-grid { gap: 10px; }
  .product-grid img { height: 160px; max-width: 30vw; }
  .back-btn { height: 40px; left: 10px; }
}
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <img src="images/ui/PagesHeader.png" alt="header" class="hdr-img" />
    <img src="images/ui/logo222.png" alt="logo" class="logo" />
    <div class="header-icons">
      <img src="images/icons/SearchIcon.png" alt="search" />
      <a href="index.html"><img src="images/icons/HomeIcon.png" alt="home" /></a>
      <div class="products-dropdown">
        <img src="images/icons/SeeProductsIcon.png" alt="products" id="productsBtn" />
        <div class="dropdown-menu" id="dropdownMenu">
          <a href="index (3).html">سایه بان</a>
          <a href="index (4).html">صندلی</a>
          <a href="index (6).html">باربیکیو</a>
          <a href="index (5).html">لوازم شنا</a>
        </div>
      </div>
      <img src="images/icons/PurchaseBagIcon.png" alt="cart" />
      <a href="index (2).html"><img src="images/icons/AboutUsIcon.png" alt="about" /></a>
    </div>
  </div>

  <div class="main-area">
    <a href="index.html">
      <img src="images/ui/backButton.png" alt="back" class="back-btn" />
    </a>
    <div class="product-grid">
      <a href="557.html"><img src="images/swim/557.png" alt="ماسک و اسنورکل" /></a>
      <a href="556.html"><img src="images/swim/556.png" alt="حلقه شنا" /></a>
      <a href="555.html"><img src="images/swim/555.png" alt="میله شنا" /></a>
    </div>
  </div>

</div>
<script>
  var btn = document.getElementById('productsBtn');
  var menu = document.getElementById('dropdownMenu');
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    menu.classList.toggle('open');
  });
  document.addEventListener('click', function() {
    menu.classList.remove('open');
  });
</script>
</body>
</html>
