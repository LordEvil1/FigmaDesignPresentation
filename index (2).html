<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>درباره ما</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

.page {
  position: relative;
  width: 100%;
  height: 100vh;
  background-image: url('pasabi.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  position: relative;
  width: 100%;
  flex-shrink: 0;
}

.header .hdr-img {
  width: 100%;
  height: 150px;
  display: block;
  object-fit: cover;
  object-position: center;
}

.header .logo {
  position: absolute;
  top: 10px;
  left: 20px;
  height: 120px;
  object-fit: contain;
}

.header .brand {
  position: absolute;
  top: 20px;
  right: 20px;
  height: 30px;
  object-fit: contain;
}

.header-icons {
  position: absolute;
  top: 25%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  align-items: center;
  gap: 18px;
  direction: ltr;
}

.header-icons a,
.header-icons img {
  display: block;
  height: 38px;
  width: auto;
  object-fit: contain;
  cursor: pointer;
}

/* MAIN */
.main-area {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.main-area .about-img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  display: block;
}

.back-btn {
  position: absolute;
  left: 30px;
  top: 50%;
  transform: translateY(-50%);
  height: 60px;
  object-fit: contain;
  cursor: pointer;
  z-index: 2;
}
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <img src="PagesHeader.png" alt="header" class="hdr-img" />
    <img src="logo.png" alt="logo" class="logo" />
    <img src="LogoTypeInPersian.png" alt="brand" class="brand" />
    <div class="header-icons">
      <img src="SearchIcon.png" alt="search" />
      <a href="index.html"><img src="HomeIcon.png" alt="home" /></a>
      <a href="index.html"><img src="SeeProductsIcon.png" alt="products" /></a>
      <img src="PurchaseBagIcon.png" alt="cart" />
      <a href="index (5).html"><img src="AboutUsIcon.png" alt="about" /></a>
    </div>
  </div>

  <div class="main-area">
    <a href="index.html">
      <img src="backButton.png" alt="back" class="back-btn" />
    </a>
    <img src="AboutUs_Page.png" alt="درباره ما" class="about-img" />
  </div>

</div>
</body>
</html>
