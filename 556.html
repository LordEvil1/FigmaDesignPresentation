<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>حلقه شنا اینتکس</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

.page {
  position: relative;
  width: 100%;
  height: 100vh;
  background-image: url('556Page.png');
  background-size: 100% 100%;
  background-repeat: no-repeat;
}

/* back arrow on the left side of the page */
.btn-back {
  position: absolute;
  left: 1.5%;
  top: 44%;
  width: 6%;
  height: 12%;
  cursor: pointer;
}

.btn-home {
  position: absolute;
  left: calc(40.5% - 10px);
  top: 0.5%;
  width: 5%;
  height: 6%;
  cursor: pointer;
}
</style>
</head>
<body>
<div class="page">
  <a href="index (5).html" class="btn-back"></a>
  <a href="index.html" class="btn-home"></a>
</div>
</body>
</html>
